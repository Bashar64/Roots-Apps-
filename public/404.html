<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style media="screen">
      body { background: #f8fafb; color: #304246; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
      .container { padding: 30px; }
      h1 { font-size: 48px; margin-bottom: 10px; color: #F37828; }
      p { font-size: 18px; margin-bottom: 30px; color: #4a6168; }
      a { text-decoration: none; background: #304246; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 700; transition: background 0.2s; }
      a:hover { background: #F37828; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>The page you're looking for doesn't exist.</p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
